<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>古洛安超级会员专区</title>
  <meta name="description" content="古洛安超级会员专区 - 专属优惠与特权">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    
    :root {
      --primary: #14315A;
      --gold: #C5A572;
      --gold-light: #D4B88A;
      --bg: #FBF8F3;
      --white: #FFFFFF;
      --gray: #8E8E93;
      --gray-light: #F2F2F7;
      --error: #FF3B30;
      --success: #34C759;
      --shadow: 0 4px 20px rgba(20, 49, 90, 0.12);
    }
    
    body { background: var(--bg); color: var(--primary); min-height: 100vh; overflow-x: hidden; }
    
    /* Header */
    .header { background: linear-gradient(135deg, var(--primary) 0%, #1a4570 100%); padding: 40px 24px 60px; text-align: center; border-radius: 0 0 32px 32px; position: relative; overflow: hidden; }
    .header::before { content: ''; position: absolute; top: -50%; right: -30%; width: 80%; height: 200%; background: radial-gradient(ellipse, rgba(197, 165, 114, 0.15) 0%, transparent 70%); }
    .header-logo { font-size: 28px; font-weight: 700; color: var(--white); letter-spacing: 4px; position: relative; }
    .header-logo span { color: var(--gold); }
    .header-sub { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 8px; position: relative; }
    
    /* Container */
    .container { max-width: 480px; margin: -40px auto 0; padding: 0 16px 24px; position: relative; z-index: 1; }
    
    /* Card */
    .card { background: var(--white); border-radius: 20px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 16px; animation: slideUp 0.4s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Form */
    .form-title { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 24px; color: var(--primary); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 14px; color: var(--gray); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 14px 16px; border: 1.5px solid #E5E5EA; border-radius: 12px; font-size: 16px; color: var(--primary); background: var(--white); transition: all 0.3s; }
    .form-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(197, 165, 114, 0.15); }
    .form-input::placeholder { color: #C7C7CC; }
    
    /* Button */
    .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-align: center; }
    .btn-primary { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: var(--white); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: transparent; color: var(--gray); font-size: 14px; margin-top: 16px; }
    
    /* Links */
    .link-row { display: flex; justify-content: center; gap: 24px; margin-top: 20px; }
    .link-row a { color: var(--gray); font-size: 14px; text-decoration: none; }
    .link-row a:active { color: var(--primary); }
    
    /* Message */
    .message { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }
    .message.show { display: block; animation: shake 0.4s; }
    .message-error { background: #FFF2F2; color: var(--error); }
    .message-success { background: #F2FFF4; color: var(--success); }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    
    /* Member Dashboard */
    .dashboard { display: none; }
    .dashboard.show { display: block; }
    
    .user-card { display: flex; align-items: center; gap: 16px; padding: 20px; background: linear-gradient(135deg, var(--primary) 0%, #1a4570 100%); border-radius: 16px; margin-bottom: 20px; position: relative; overflow: hidden; }
    .user-card::after { content: ''; position: absolute; top: -30%; right: -20%; width: 60%; height: 160%; background: radial-gradient(ellipse, rgba(197, 165, 114, 0.2) 0%, transparent 70%); }
    .user-avatar { width: 56px; height: 56px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--white); font-weight: 600; position: relative; }
    .user-info { flex: 1; position: relative; z-index: 1; }
    .user-name { font-size: 18px; font-weight: 600; color: var(--white); }
    .user-no { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px; }
    
    /* Content List */
    .content-list { display: flex; flex-direction: column; gap: 12px; }
    .content-item { display: flex; align-items: center; gap: 14px; padding: 16px; background: var(--white); border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: all 0.3s; border: 1px solid transparent; }
    .content-item:active { transform: scale(0.98); border-color: var(--gold); }
    .content-icon { width: 44px; height: 44px; background: var(--gray-light); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .content-icon.purchase { background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%); }
    .content-icon.info { background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%); }
    .content-info { flex: 1; }
    .content-title { font-size: 16px; font-weight: 600; color: var(--primary); }
    .content-desc { font-size: 13px; color: var(--gray); margin-top: 2px; }
    .content-arrow { color: #C7C7CC; font-size: 18px; }
    
    /* Section Title */
    .section-title { font-size: 15px; font-weight: 600; color: var(--gray); margin-bottom: 12px; padding-left: 4px; text-transform: uppercase; letter-spacing: 1px; }
    
    /* Logout */
    .logout-btn { background: var(--gray-light); color: var(--primary); margin-top: 8px; }
    
    /* Menu */
    .menu { display: flex; justify-content: center; gap: 32px; padding: 16px 0; border-bottom: 1px solid var(--gray-light); margin-bottom: 20px; }
    .menu-item { font-size: 15px; color: var(--gray); cursor: pointer; padding: 8px 16px; border-radius: 8px; transition: all 0.3s; }
    .menu-item.active { color: var(--primary); background: var(--gray-light); font-weight: 600; }
    .menu-item:active { color: var(--primary); }
    
    /* Loading */
    .loading { display: none; text-align: center; padding: 40px; color: var(--gray); }
    .loading.show { display: block; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--gray-light); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Tips */
    .tips { font-size: 13px; color: var(--gray); text-align: center; margin-top: 16px; line-height: 1.6; }
  </style>
</head>
<body>
  <!-- Login View -->
  <div id="loginView">
    <div class="header">
      <div class="header-logo">古<span>洛</span>安</div>
      <div class="header-sub">超级会员专区</div>
    </div>
    <div class="container">
      <div class="card">
        <div class="form-title">欢迎回来</div>
        <div id="loginError" class="message message-error"></div>
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">会员号</label>
            <input type="text" class="form-input" id="loginMemberNo" placeholder="请输入会员号" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" autocomplete="off">
          </div>
          <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
        </form>
        <div class="link-row">
          <a href="#" id="goRegister">注册会员</a>
          <a href="#" id="goForgot">忘记密码</a>
        </div>
      </div>
      <div class="tips">
        登录即表示同意<a href="#" style="color: var(--gold);">《会员协议》</a>
      </div>
    </div>
  </div>
  
  <!-- Register View -->
  <div id="registerView" style="display: none;">
    <div class="header">
      <div class="header-logo">古<span>洛</span>安</div>
      <div class="header-sub">超级会员专区</div>
    </div>
    <div class="container">
      <div class="card">
        <div class="form-title">注册成为会员</div>
        <div id="registerError" class="message message-error"></div>
        <div id="registerSuccess" class="message message-success"></div>
        <form id="registerForm">
          <div class="form-group">
            <label class="form-label">姓名</label>
            <input type="text" class="form-input" id="regName" placeholder="请输入姓名" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">手机号</label>
            <input type="tel" class="form-input" id="regPhone" placeholder="请输入手机号" maxlength="11" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">设置密码</label>
            <input type="password" class="form-input" id="regPassword" placeholder="请设置密码（至少6位）" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">确认密码</label>
            <input type="password" class="form-input" id="regPassword2" placeholder="请再次输入密码" autocomplete="off">
          </div>
          <button type="submit" class="btn btn-primary" id="registerBtn">注册</button>
        </form>
        <div class="link-row">
          <a href="#" id="goLogin">已有账号？登录</a>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Dashboard View -->
  <div id="dashboardView" class="dashboard">
    <div class="header">
      <div class="header-logo">古<span>洛</span>安</div>
      <div class="header-sub">超级会员专区</div>
    </div>
    <div class="container">
      <!-- User Info -->
      <div class="user-card">
        <div class="user-avatar" id="userAvatar">😀</div>
        <div class="user-info">
          <div class="user-name" id="userName">会员</div>
          <div class="user-no" id="userNo">NO: -</div>
        </div>
      </div>
      
      <!-- Menu -->
      <div class="menu">
        <div class="menu-item active" data-tab="content">专属权益</div>
        <div class="menu-item" data-tab="profile">我的资料</div>
      </div>
      
      <!-- Loading -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>加载中...</div>
      </div>
      
      <!-- Content Tab -->
      <div id="contentTab">
        <div class="section-title">会员专属</div>
        <div class="content-list" id="contentList">
          <!-- Content loaded dynamically -->
        </div>
      </div>
      
      <!-- Profile Tab -->
      <div id="profileTab" style="display: none;">
        <div class="card">
          <div class="section-title" style="margin-top: 0;">会员信息</div>
          <div class="content-list">
            <div class="content-item">
              <div class="content-icon">📛</div>
              <div class="content-info">
                <div class="content-title">会员号</div>
                <div class="content-desc" id="profileNo">-</div>
              </div>
            </div>
            <div class="content-item">
              <div class="content-icon">👤</div>
              <div class="content-info">
                <div class="content-title">姓名</div>
                <div class="content-desc" id="profileName">-</div>
              </div>
            </div>
            <div class="content-item">
              <div class="content-icon">📱</div>
              <div class="content-info">
                <div class="content-title">手机号</div>
                <div class="content-desc" id="profilePhone">-</div>
              </div>
            </div>
            <div class="content-item">
              <div class="content-icon">📅</div>
              <div class="content-info">
                <div class="content-title">注册时间</div>
                <div class="content-desc" id="profileCreated">-</div>
              </div>
            </div>
          </div>
        </div>
        <button class="btn btn-primary logout-btn" id="logoutBtn">退出登录</button>
      </div>
    </div>
  </div>
  
  <script>
    // ==================== Config ====================
    const API_BASE = '';
    
    // ==================== Utils ====================
    function showError(elId, msg) {
      const el = document.getElementById(elId);
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }
    
    function showSuccess(elId, msg) {
      const el = document.getElementById(elId);
      el.textContent = msg;
      el.classList.add('show');
    }
    
    function getToken() { return localStorage.getItem('guluan_token'); }
    function setToken(token) { localStorage.setItem('guluan_token', token); }
    function removeToken() { localStorage.removeItem('guluan_token'); }
    function getMember() { return JSON.parse(localStorage.getItem('guluan_member') || '{}'); }
    function setMember(m) { localStorage.setItem('guluan_member', JSON.stringify(m)); }
    
    // ==================== API ====================
    async function apiCall(endpoint, data) {
      const options = { method: 'POST', headers: { 'Content-Type': 'application/json' } };
      if (data) options.body = JSON.stringify(data);
      const token = getToken();
      if (token) options.headers['Authorization'] = 'Bearer ' + token;
      
      const res = await fetch(API_BASE + endpoint, options);
      return res.json();
    }
    
    // ==================== View Switching ====================
    function showView(viewId) {
      ['loginView', 'registerView', 'dashboardView'].forEach(id => {
        document.getElementById(id).style.display = id === viewId ? 'block' : 'none';
      });
    }
    
    function showDashboard() {
      showView('dashboardView');
      loadDashboard();
    }
    
    // ==================== Load Dashboard ====================
    async function loadDashboard() {
      const member = getMember();
      document.getElementById('userName').textContent = member.name || '会员';
      document.getElementById('userNo').textContent = 'NO: ' + (member.memberNo || '-');
      document.getElementById('userAvatar').textContent = (member.name || '会').charAt(0);
      
      // Load content
      document.getElementById('loading').classList.add('show');
      document.getElementById('contentTab').style.display = 'none';
      
      try {
        const res = await apiCall('/api/content');
        document.getElementById('loading').classList.remove('show');
        
        if (res.success) {
          document.getElementById('contentTab').style.display = 'block';
          const list = document.getElementById('contentList');
          list.innerHTML = res.data.map(item => `
            <div class="content-item" data-url="${item.url || ''}" data-type="${item.type}">
              <div class="content-icon ${item.type}">${item.type === 'purchase' ? '🛒' : '📢'}</div>
              <div class="content-info">
                <div class="content-title">${item.title}</div>
                <div class="content-desc">${item.description}</div>
              </div>
              <div class="content-arrow">›</div>
            </div>
          `).join('');
          
          // Add click handlers
          list.querySelectorAll('.content-item').forEach(item => {
            item.addEventListener('click', () => {
              const url = item.dataset.url;
              if (url) window.location.href = url;
            });
          });
        } else {
          showError('loginError', res.message || '加载失败');
        }
        
        // Load profile
        const profileRes = await apiCall('/api/profile');
        if (profileRes.success) {
          const p = profileRes.data;
          document.getElementById('profileNo').textContent = p.member_no;
          document.getElementById('profileName').textContent = p.name;
          document.getElementById('profilePhone').textContent = p.phone;
          document.getElementById('profileCreated').textContent = new Date(p.created_at).toLocaleDateString('zh-CN');
        }
      } catch (err) {
        document.getElementById('loading').classList.remove('show');
        showError('loginError', '网络错误');
      }
    }
    
    // ==================== Check Auth ====================
    async function checkAuth() {
      const token = getToken();
      if (!token) return;
      
      const member = getMember();
      if (member.memberNo) {
        showDashboard();
      } else {
        try {
          const res = await apiCall('/api/profile');
          if (res.success) {
            setMember(res.data);
            showDashboard();
          } else {
            removeToken();
          }
        } catch (err) {
          removeToken();
        }
      }
    }
    
    // ==================== Event Handlers ====================
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = '登录中...';
      
      try {
        const res = await apiCall('/api/login', {
          memberNo: document.getElementById('loginMemberNo').value,
          password: document.getElementById('loginPassword').value
        });
        
        if (res.success) {
          setToken(res.data.token);
          setMember(res.data);
          showDashboard();
        } else {
          showError('loginError', res.message);
        }
      } catch (err) {
        showError('loginError', '网络错误');
      }
      
      btn.disabled = false;
      btn.textContent = '登录';
    });
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = '注册中...';
      
      const name = document.getElementById('regName').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value;
      const password2 = document.getElementById('regPassword2').value;
      
      if (!name || !phone || !password || !password2) {
        showError('registerError', '请填写完整信息');
        btn.disabled = false;
        btn.textContent = '注册';
        return;
      }
      
      if (password !== password2) {
        showError('registerError', '两次密码不一致');
        btn.disabled = false;
        btn.textContent = '注册';
        return;
      }
      
      try {
        const res = await apiCall('/api/register', { name, phone, password });
        
        if (res.success) {
          showSuccess('registerSuccess', '注册成功！您的会员号：' + res.data.memberNo);
          setTimeout(() => {
            setToken(res.data.token);
            setMember(res.data);
            showDashboard();
          }, 1500);
        } else {
          showError('registerError', res.message);
        }
      } catch (err) {
        showError('registerError', '网络错误');
      }
      
      btn.disabled = false;
      btn.textContent = '注册';
    });
    
    document.getElementById('goRegister').addEventListener('click', (e) => {
      e.preventDefault();
      showView('registerView');
    });
    
    document.getElementById('goLogin').addEventListener('click', (e) => {
      e.preventDefault();
      showView('loginView');
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
      removeToken();
      localStorage.removeItem('guluan_member');
      showView('loginView');
    });
    
    // Tab switching
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        
        const tab = item.dataset.tab;
        document.getElementById('contentTab').style.display = tab === 'content' ? 'block' : 'none';
        document.getElementById('profileTab').style.display = tab === 'profile' ? 'block' : 'none';
      });
    });
    
    // ==================== Init ====================
    checkAuth();
  </script>
</body>
</html>
